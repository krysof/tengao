<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="tengai-builtin-package" content="./assets/builtin.assets.zip" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Tengai WebAssembly 游戏移植版" />
    <title>Tengai</title>
    <link rel="stylesheet" href="./styles.min.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>TENGAI</h1>
        <div id="core-status" class="core-status loading" data-state="loading">
          <span class="status-light" aria-hidden="true"></span>
          <strong>正在启动…</strong>
        </div>
      </header>

      <section id="playfield" class="playfield" aria-label="Tengai game and virtual controller">
        <div class="pad-side pad-left">
          <div id="touch-dpad" class="dpad joystick" role="group" aria-label="方向摇杆">
            <span class="joystick-direction joystick-up" data-direction="up" aria-hidden="true">▲</span>
            <span class="joystick-direction joystick-left" data-direction="left" aria-hidden="true">◀</span>
            <span class="joystick-direction joystick-right" data-direction="right" aria-hidden="true">▶</span>
            <span class="joystick-direction joystick-down" data-direction="down" aria-hidden="true">▼</span>
            <span id="joystick-knob" class="joystick-knob" aria-hidden="true"><i></i></span>
          </div>
        </div>

        <div class="screen-column">
          <section
            id="language-panel"
            class="language-panel"
            aria-labelledby="language-title"
          >
            <div class="language-screen">
              <h2 id="language-title" class="language-title">LANGUAGE SELECT</h2>
              <div
                id="language-options"
                class="language-options"
                role="listbox"
                aria-label="Language"
              ></div>
              <button id="language-confirm" class="language-confirm" type="button">
                START OR A
              </button>
            </div>
          </section>

          <section id="native-video-panel" class="screen-panel" hidden aria-label="游戏画面">
            <div class="canvas-frame native-frame-shell">
              <canvas id="native-frame"></canvas>
            </div>
            <div id="native-frame-stats" class="frame-stats">等待执行</div>
          </section>

          <section id="boot-panel" class="boot-panel" hidden aria-live="polite">
            <span class="boot-spinner" aria-hidden="true"></span>
            <strong id="boot-label" data-i18n="boot_loading">LOADING GAME…</strong>
            <label id="drop-zone" class="drop-zone" for="asset-file" tabindex="0" hidden>
              <input id="asset-file" type="file" accept=".zip,application/zip" />
              <span class="drop-title">SELECT GAME DATA PACK</span>
            </label>
          </section>

        </div>

        <div class="pad-side pad-right">
          <div class="right-controls">
            <div id="system-buttons" class="system-buttons" aria-label="系统按键"></div>
            <div id="action-cluster" class="action-cluster" aria-label="动作键"></div>
          </div>
        </div>
      </section>

      <div id="load-error" class="error-message" role="alert" hidden></div>

      <details id="diagnostics" class="diagnostics">
        <summary data-i18n="diagnostics">DIAGNOSTICS</summary>
        <div class="diagnostic-body">
          <section id="summary" class="summary-grid" aria-live="polite" hidden>
            <article class="metric panel">
              <small>GAME SET</small><strong id="metric-set">—</strong><span id="metric-title">—</span>
            </article>
            <article class="metric panel">
              <small>VALIDATION</small><strong id="metric-validation">—</strong><span id="metric-files">—</span>
            </article>
            <article class="metric panel">
              <small>INITIAL SP</small><strong id="metric-sp" class="mono">—</strong>
            </article>
            <article class="metric panel">
              <small>RESET PC</small><strong id="metric-pc" class="mono">—</strong>
            </article>
            <article class="metric panel wide">
              <small>NATIVE RUNTIME</small><strong id="metric-main-crc" class="mono">—</strong><span id="metric-main-size">—</span>
            </article>
          </section>

          <section id="audit-panel" class="panel diagnostic-panel" hidden aria-label="资源清单">
            <div class="panel-heading">
              <h2 data-i18n="assets">ASSET MANIFEST</h2><div id="audit-badge" class="badge" data-i18n="waiting_validation">WAITING FOR VALIDATION</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>文件</th><th>用途</th><th>大小</th><th>CRC-32</th><th>状态</th></tr></thead>
                <tbody id="audit-rows"></tbody>
              </table>
            </div>
          </section>

          <section id="atlas-panel" class="panel diagnostic-panel" hidden aria-label="图块查看器">
            <div class="panel-heading atlas-heading">
              <h2 data-i18n="tiles">TILES</h2>
              <div class="atlas-controls">
                <select id="atlas-source" aria-label="图块数据源"></select>
                <button id="page-prev" type="button" aria-label="Previous page">←</button>
                <button id="page-next" type="button" aria-label="Next page">→</button>
              </div>
            </div>
            <div class="canvas-frame"><canvas id="tile-atlas" width="512" height="256"></canvas></div>
            <div class="atlas-footer">
              <input id="page-slider" type="range" min="0" max="0" value="0" />
              <span id="atlas-page">PAGE —</span><span id="atlas-stats">—</span>
            </div>
          </section>

          <section class="panel diagnostic-panel log-panel" aria-label="诊断日志">
            <div class="panel-heading">
              <h2 data-i18n="log">LOG</h2><button id="clear-log" class="ghost-button" type="button" data-i18n="clear">CLEAR</button>
            </div>
            <ol id="event-log" class="event-log" aria-live="polite"></ol>
          </section>
          <p id="native-controls-help" class="controls-help"></p>
          <footer><span id="build-version">core: pending</span></footer>
        </div>
      </details>
    </main>
    <script type="module" src="./app.min.js"></script>
  </body>
</html>
